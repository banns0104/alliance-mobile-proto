function MiniCalendar({year,month,onMonth,dotDates=[],selectedDate,onSelect}){
  const firstDay=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();
  const weeks=[];let d=1-firstDay;
  while(d<=daysInMonth){const w=[];for(let i=0;i<7;i++,d++)w.push(d>=1&&d<=daysInMonth?d:null);weeks.push(w);}
  const isSel=d2=>{if(!selectedDate||!d2)return false;const s=new Date(selectedDate);return s.getDate()===d2&&s.getMonth()+1===month&&s.getFullYear()===year;};
  const getDot=d2=>{if(!d2)return null;const k=`${year}-${String(month).padStart(2,"0")}-${String(d2).padStart(2,"0")}`;return dotDates.find(x=>x.date===k);};
  return <div style={{background:C.white,padding:"0 16px 14px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0 10px"}}>
      <button onClick={()=>onMonth(-1)} style={{border:"none",background:"transparent",width:34,height:34,borderRadius:17,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:C.desc,fontSize:18,fontWeight:700}}>‹</button>
      <span style={{fontWeight:700,fontSize:15,letterSpacing:"-0.5px",color:C.black}}>{year}년 {month}월</span>

/* ─── DATE SELECTOR ─────────── */
function ProductDateSelector({year,month,onMonth,selDate,onSelDate,products}){
  // 해당 월의 날짜별 상품 수 집계
  const monthStr=`${year}-${String(month).padStart(2,"0")}`;
  const dateSet={};
  products.forEach(p=>{
    if(p.date.startsWith(monthStr)){
      if(!dateSet[p.date])dateSet[p.date]={total:0,selling:0};
      dateSet[p.date].total++;
      if(p.status==="selling")dateSet[p.date].selling++;
    }
  });
  const daysInMonth=new Date(year,month,0).getDate();
  const allDates=Array.from({length:daysInMonth},(_,i)=>{
    const d=`${year}-${String(month).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
    return{date:d,day:i+1,dow:new Date(d).getDay(),info:dateSet[d]||null};
  });
  const scrollRef=useRef(null);

  // 선택된 날짜 칩으로 자동 스크롤
  useEffect(()=>{
    if(!scrollRef.current||!selDate)return;
    const chip=scrollRef.current.querySelector(`[data-date="${selDate}"]`);
    if(chip)chip.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  },[selDate]);

  return <div style={{background:C.white,borderBottom:`1px solid ${C.line}`}}>
    {/* 월 네비게이션 */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px 10px"}}>
      <button onClick={()=>onMonth(-1)} style={{width:34,height:34,borderRadius:8,border:`1.5px solid ${C.line}`,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:C.desc,fontWeight:700}}>‹</button>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontWeight:800,fontSize:17,color:C.black,letterSpacing:"-0.6px"}}>{year}년 {month}월</span>
        {/* 이번 달로 돌아오기 */}
        {!(year===2026&&month===2)&&<button onClick={()=>{onMonth("reset");}} style={{border:`1.5px solid ${C.line}`,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:600,color:C.desc,background:C.bg3,cursor:"pointer",letterSpacing:"-0.2px"}}>이번 달</button>}
      </div>
      <button onClick={()=>onMonth(1)} style={{width:34,height:34,borderRadius:8,border:`1.5px solid ${C.line}`,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:C.desc,fontWeight:700}}>›</button>
    </div>

    {/* 월 전체 / 날짜 칩 */}
    <div ref={scrollRef} style={{display:"flex",gap:6,overflowX:"auto",padding:"0 16px 14px",alignItems:"flex-end"}}>
      {/* 전체 칩 */}
      <button
        onClick={()=>onSelDate(null)}
        style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 10px",borderRadius:10,border:`1.5px solid`,borderColor:selDate===null?C.blue:C.line,background:selDate===null?C.blue:C.white,cursor:"pointer",minWidth:44}}
      >
        <span style={{fontSize:10,fontWeight:700,color:selDate===null?C.white:C.desc,letterSpacing:"-0.2px"}}>전체</span>
        <span style={{fontSize:16,fontWeight:800,color:selDate===null?C.white:C.black,letterSpacing:"-0.5px",lineHeight:1}}>
          {Object.keys(dateSet).length}
        </span>
        <span style={{fontSize:9,color:selDate===null?"rgba(255,255,255,.7)":C.dimmed,letterSpacing:"-0.2px"}}>일</span>
      </button>

      {/* 날짜 칩들 */}
      {allDates.map(({date,day,dow,info})=>{
        const isActive=selDate===date;
        const hasProd=!!info;
        const isSun=dow===0; const isSat=dow===6;
        const dayColor=isSun?C.red:isSat?C.blue:C.desc;
        return <button
          key={date}
          data-date={date}
          onClick={()=>onSelDate(isActive?null:date)}
          style={{
            flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
            padding:"8px 6px",borderRadius:10,border:`1.5px solid`,
            borderColor:isActive?C.blue:hasProd?C.line2:C.line,
            background:isActive?C.blue:hasProd?C.white:"transparent",
            cursor:"pointer",minWidth:40,opacity:hasProd?1:0.4,
          }}
        >
          <span style={{fontSize:10,fontWeight:600,color:isActive?C.white:dayColor,letterSpacing:"-0.2px"}}>{DAY_KO[dow]}</span>
          <span style={{fontSize:17,fontWeight:800,color:isActive?C.white:hasProd?C.black:C.dimmed,letterSpacing:"-0.5px",lineHeight:1}}>{day}</span>
          {hasProd
            ?<span style={{fontSize:9,fontWeight:700,color:isActive?C.yellow:C.blue,letterSpacing:"-0.2px"}}>{info.total}개</span>
            :<span style={{fontSize:9,color:"transparent"}}>-</span>
          }
        </button>;
      })}
    </div>
  </div>;
}

  </div>;
}

          ["운영 요일",weekStr||"-"],

      <button onClick={()=>onDelete(master)} style={{border:"none",background:"transparent",fontSize:12,fontWeight:600,color:C.red,cursor:"pointer",padding:"2px 20px",letterSpacing:"-0.2px"}}>상품삭제</button>

}

/* 일자별상품 탭 (기존 ProductListScreen 로직) */
function DailyProductTab({dailyProducts,setDailyProducts,masterProducts,addManualRsv,allRsvs}){
  const [calYear,setCalYear]=useState(2026);
  const [calMonth,setCalMonth]=useState(2);
  const [selDate,setSelDate]=useState(null);
  const [expanded,setExpanded]=useState({});
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState("");

  const t2=m=>{setToast(m);setTimeout(()=>setToast(""),2200);};
  const handleMonth=d=>{
    if(d==="reset"){setCalYear(2026);setCalMonth(2);setSelDate(null);return;}
    let m=calMonth+d,y=calYear;
    if(m>12){m=1;y++;}if(m<1){m=12;y--;}setCalMonth(m);setCalYear(y);setSelDate(null);
  };
  const handleSelDate=d=>{setSelDate(d);if(d)setExpanded(prev=>({...prev,[d]:true}));};

  const toggleDisplay=id=>{
    setDailyProducts(p=>p.map(x=>x.id===id?{...x,bpiIsDisplay:!x.bpiIsDisplay}:x));
    t2("노출 상태 변경됨");
  };
  const saveCapacity=(id,qty)=>{setDailyProducts(p=>p.map(x=>x.id===id?{...x,bpiQty:qty}:x));setModal(null);t2("판매 좌석 수 조정 완료");};
  const quickSoldout=id=>{setDailyProducts(p=>p.map(x=>x.id===id?{...x,bpiQty:x.sold}:x));t2("즉시 마감 처리됨");};

  const monthStr=`${calYear}-${String(calMonth).padStart(2,"0")}`;
  const filtered=dailyProducts.filter(p=>selDate?p.date===selDate:p.date.startsWith(monthStr));
  const grouped={};filtered.forEach(p=>{if(!grouped[p.date])grouped[p.date]=[];grouped[p.date].push(p);});

  const labelStyle={fontSize:11,color:C.dimmed,letterSpacing:"-0.2px"};
  const productDots=dailyProducts.filter(p=>p.date.startsWith(monthStr)&&p.bpiIsDisplay).map(p=>({date:p.date,label:""}));

  return <div>
    {/* 날짜 선택기 */}
    <div style={{background:C.white,borderBottom:`1px solid ${C.line}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 8px"}}>
        <button onClick={()=>handleMonth(-1)} style={{border:"none",background:"transparent",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:C.desc,fontSize:18,fontWeight:700}}>‹</button>
        <button onClick={()=>handleMonth("reset")} style={{fontWeight:700,fontSize:15,color:C.black,letterSpacing:"-0.5px",border:"none",background:"transparent",cursor:"pointer"}}>{calYear}년 {calMonth}월</button>
        <button onClick={()=>handleMonth(1)} style={{border:"none",background:"transparent",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:C.desc,fontSize:18,fontWeight:700}}>›</button>
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",padding:"0 16px 12px"}}>
        <button onClick={()=>handleSelDate(null)} style={{flexShrink:0,padding:"5px 14px",borderRadius:50,border:`1.5px solid ${!selDate?C.blue:C.line2}`,background:!selDate?C.blue:C.white,color:!selDate?C.white:C.desc,fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:"-0.2px"}}>전체</button>
        {[...new Set(dailyProducts.filter(p=>p.date.startsWith(monthStr)).map(p=>p.date))].sort().map(d=>{
          const dt=new Date(d);const day=dt.getDate();const dow=DAY_KO[dt.getDay()];
          const sel=selDate===d;
          return <button key={d} onClick={()=>handleSelDate(d)} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 12px",borderRadius:10,border:`1.5px solid ${sel?C.blue:C.line2}`,background:sel?C.blue:C.white,cursor:"pointer",gap:2}}>
            <span style={{fontSize:10,color:sel?C.white:C.dimmed,fontWeight:600}}>{dow}</span>
            <span style={{fontSize:15,fontWeight:800,color:sel?C.white:C.black,letterSpacing:"-0.5px"}}>{day}</span>
          </button>;
        })}
      </div>
    </div>

    {/* 현황 요약 */}
    <div style={{margin:"10px 16px",background:C.white,borderRadius:12,border:`1px solid ${C.line}`,padding:"12px 16px"}}>
      <div style={{fontSize:11,color:C.dimmed,marginBottom:8,letterSpacing:"-0.2px"}}>
        {selDate?`${selDate.replace(/-/g,".")} 일자별 현황`:`${calYear}년 ${calMonth}월 일자별 현황`}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:0}}>
        {[
          ["노출",filtered.filter(p=>p.bpiIsDisplay).length+"개",C.blue],
          ["숨김",filtered.filter(p=>!p.bpiIsDisplay).length+"개",C.desc],
          ["총 예약",filtered.reduce((s,p)=>s+p.sold,0)+"명",C.black],
          ["잔여",filtered.reduce((s,p)=>s+p.sold,0)+"/"+filtered.reduce((s,p)=>s+p.bpiQty,0)+"석",C.green],
        ].map(([l,v,c],i)=><div key={l} style={{textAlign:"center",borderRight:i<3?`1px solid ${C.line}`:"none"}}>
          <div style={{...labelStyle,marginBottom:4}}>{l}</div>
          <div style={{fontWeight:800,fontSize:18,color:c,letterSpacing:"-0.5px"}}>{v}</div>
        </div>)}
      </div>
    </div>

    {/* 일자별 카드 리스트 */}
    {Object.keys(grouped).length===0&&<div style={{padding:"50px 0",textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:12}}>📅</div>
      <div style={{fontWeight:700,fontSize:14,color:C.desc,letterSpacing:"-0.3px"}}>해당 기간에 일자별 상품이 없습니다</div>
      <div style={{fontSize:12,color:C.dimmed,marginTop:4}}>출조종류 등록 후 날짜별 출조가 자동 생성됩니다</div>
    </div>}

    <div style={{padding:"0 16px"}}>
      {Object.entries(grouped).sort((a,b)=>a[0]>b[0]?1:-1).map(([date,ps])=>{
        const open=expanded[date]!==false;
        const displayCnt=ps.filter(p=>p.bpiIsDisplay).length;
        const sold=ps.reduce((s,p)=>s+p.sold,0);
        const cap=ps.reduce((s,p)=>s+p.bpiQty,0);
        return <div key={date} style={{marginBottom:16}}>
          {/* 날짜 헤더 */}
          <button onClick={()=>setExpanded(prev=>({...prev,[date]:!open}))} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.black,border:"none",borderRadius:open?"10px 10px 0 0":10,padding:"11px 14px",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontWeight:700,fontSize:14,color:C.white,letterSpacing:"-0.5px"}}>{fmtDate(date)}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{ps.length}개</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.6)",letterSpacing:"-0.3px"}}>노출 {displayCnt} · 예약 {sold}/{cap}명</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                {open?<polyline points="18 15 12 9 6 15"/>:<polyline points="6 9 12 15 18 9"/>}
              </svg>
            </div>
          </button>
          {open&&<div style={{background:C.bg3,borderRadius:"0 0 12px 12px",padding:"8px 8px 4px"}}>
            {ps.map(p=>{
              const rem=p.bpiQty-p.sold;
              const pct=Math.round(p.sold/Math.max(p.bpiQty,1)*100);
              const rsvCount=(allRsvs||RESERVATIONS).filter(r=>r.prodId===p.id).length;
              const master=masterProducts.find(m=>m.id===p.masterProductId);
              return <div key={p.id} style={{background:C.white,borderRadius:12,marginBottom:8,overflow:"hidden",opacity:p.bpiIsException?0.55:1}}>
                <div style={{padding:"13px 14px 10px"}}>
                  {/* 노출토글 + 상태 + 제외뱃지 */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Toggle value={p.bpiIsDisplay} onChange={()=>toggleDisplay(p.id)} size="sm"/>
                      <span style={{fontSize:11,fontWeight:700,color:p.bpiIsDisplay?C.blue:C.desc,background:p.bpiIsDisplay?"#EBF0FF":C.bg3,padding:"3px 8px",borderRadius:4}}>
                        {p.bpiIsDisplay?"노출중":"숨김"}
                      </span>
                      {p.bpiIsWeekendRate&&<span style={{fontSize:10,fontWeight:600,color:C.orange,background:"#FFF8E0",padding:"2px 6px",borderRadius:4}}>주말요금</span>}
                    </div>
                    {rem===0&&<span style={{fontSize:11,fontWeight:700,color:C.red,background:"#FFF0F0",padding:"3px 8px",borderRadius:4}}>매진</span>}
                  </div>
                  {/* 마스터상품 연결 태그 */}
                  {master&&<div style={{fontSize:10,color:C.dimmed,marginBottom:5,letterSpacing:"-0.2px"}}>
                    <span style={{background:C.bg3,padding:"2px 6px",borderRadius:4,fontWeight:600,color:C.desc}}>출조종류: {master.name}</span>
                  </div>}
                  {/* 상품명 + 요금 */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{fontWeight:700,fontSize:15,color:C.black,letterSpacing:"-0.5px",lineHeight:1.35,flex:1,marginRight:10}}>{p.bpiName}</div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontWeight:800,fontSize:16,color:C.blue,letterSpacing:"-0.5px"}}>{p.bpiAdultRate.toLocaleString()}원</div>
                      <div style={{fontSize:10,color:C.dimmed,marginTop:1}}>대인 1인</div>
                    </div>
                  </div>
                  {/* 어종 + 시간 */}
                  <div style={{fontSize:11,color:C.desc,marginBottom:9,letterSpacing:"-0.2px"}}>
                    {p.fishSpecies.join(" · ")} · {p.bpiSReleaseTime}~{p.bpiEReleaseTime} · {p.bpiReleaseDay==="T"?"당일":"익일"}
                    {p.bpiIsKidsRate&&<span style={{marginLeft:4,color:C.dimmed}}>· 소인 {p.bpiKidsRate.toLocaleString()}원</span>}
                  </div>
                  {/* 예약/좌석 현황 */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,fontSize:12}}>
                    <span style={{color:C.desc}}>예약 <b style={{color:C.blue}}>{p.sold}</b>명 / 판매 {p.bpiQty}석</span>
                    <span style={{fontWeight:700,color:rem===0?C.red:C.black,fontSize:12}}>{p.sold}/{p.bpiQty}석</span>
                  </div>
                  <div style={{height:3,borderRadius:2,background:C.bg3,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,background:pct>=100?C.red:pct>=70?C.orange:C.blue,width:`${Math.min(pct,100)}%`,transition:"width .3s"}}/>
                  </div>
                </div>
                {/* 1행: 인원조정 / 예약추가 / 예약명단 */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderTop:`1px solid ${C.line}`}}>
                  {[
                    {label:"인원조정",action:()=>setModal({type:"cap",product:{...p,id:p.id,capacity:p.bpiQty,sold:p.sold}}),color:C.black},
                    {label:"예약추가",action:()=>setModal({type:"addRsv",product:{...p,id:p.id,name:p.bpiName,price:p.bpiAdultRate,capacity:p.bpiQty}}),color:C.blue},
                    {label:rsvCount>0?`예약명단(${rsvCount})`:"예약명단",action:()=>setModal({type:"rsv",product:{...p,id:p.id,name:p.bpiName,price:p.bpiAdultRate,capacity:p.bpiQty,sold:p.sold,fish:p.fishSpecies,depart:p.bpiSReleaseTime,arrive:p.bpiEReleaseTime,type:p.bpiReleaseDay==="T"?"당일":"야간"}}),color:C.black},
                  ].map(({label,action,color},i)=>(
                    <button key={i} onClick={action} style={{padding:"10px 0",border:"none",background:C.bg1,fontSize:12,fontWeight:600,color,cursor:"pointer",borderRight:i<2?`1px solid ${C.line}`:"none",letterSpacing:"-0.3px"}}>{label}</button>
                  ))}
                </div>
                {/* 2행: 개별수정 / 상품복사 - 텍스트만 */}
                <div style={{display:"flex",justifyContent:"space-around",padding:"8px 0 9px"}}>
                  <button onClick={()=>setModal({type:"editDaily",product:p})} style={{border:"none",background:"transparent",fontSize:12,fontWeight:500,color:C.desc,cursor:"pointer",padding:"2px 24px",letterSpacing:"-0.2px"}}>개별수정</button>
                  <button onClick={()=>quickSoldout(p.id)} style={{border:"none",background:"transparent",fontSize:12,fontWeight:500,color:C.red,cursor:"pointer",padding:"2px 24px",letterSpacing:"-0.2px"}}>즉시마감</button>
                </div>
              </div>;
            })}
          </div>}
        </div>;
      })}
    </div>

    {/* 모달 */}
    {modal?.type==="cap"&&<CapacityModal product={modal.product} onClose={()=>setModal(null)} onSave={cap=>saveCapacity(modal.product.id,cap)}/>}
    {modal?.type==="rsv"&&<ReservationListModal product={modal.product} onClose={()=>setModal(null)}/>}
    {modal?.type==="addRsv"&&<DirectReservationModal onClose={()=>setModal(null)} onSave={rsv=>{addManualRsv&&addManualRsv(rsv);setModal(null);t2("예약이 추가됐습니다");}} products={dailyProducts.map(d=>({id:d.id,name:d.bpiName,price:d.bpiAdultRate,capacity:d.bpiQty,sold:d.sold,date:d.date,depart:d.bpiSReleaseTime,arrive:d.bpiEReleaseTime,type:d.bpiReleaseDay==="T"?"당일":"야간",fish:d.fishSpecies,minBuy:1,memo:""}))} defaultProductId={modal.product?.id}/>}
    {modal?.type==="editDaily"&&<DailyProductEditModal product={modal.product} onClose={()=>setModal(null)} onSave={edited=>{setDailyProducts(p=>p.map(x=>x.id===edited.id?{...x,...edited}:x));setModal(null);t2("개별 수정 완료");}}/>}
    {toast&&<Toast msg={toast} onDone={()=>setToast("")}/>}
  </div>;
}

/* 상품관리 메인 (탭 전환) */
function ProductListScreen({onRegister,products,setProducts,addManualRsv,allRsvs,masterProducts,setMasterProducts,dailyProducts,setDailyProducts,selectedBoatId,onSelectBoat}){
  const [tab,setTab]=useState("daily"); // "master" | "daily"
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [toast,setToast]=useState("");
  const t2=m=>{setToast(m);setTimeout(()=>setToast(""),2200);};

  const handleSaveMaster=form=>{
    if(modal?.type==="editMaster"){
      setMasterProducts(p=>p.map(x=>x.id===form.id?{...x,...form}:x));
      t2("출조종류 수정 완료");
    } else {
      const newM={...form,id:nextMasterId++,boatIdx:1};
      setMasterProducts(p=>[...p,newM]);
      t2("출조종류 등록 완료");
    }
    setModal(null);
  };
  const handleDeleteMaster=master=>{
    setConfirm({
      title:"출조종류 삭제",
      msg:`'${master.name}'를 삭제합니다.\n연결된 날짜별 출조도 함께 삭제됩니다.`,
      onOk:()=>{
        setMasterProducts(p=>p.filter(x=>x.id!==master.id));
        setDailyProducts(p=>p.filter(x=>x.masterProductId!==master.id));
        setConfirm(null);t2("출조종류 삭제됨");
      }
    });
  };

  return <div style={{flex:1,overflowY:"auto",paddingBottom:70,background:C.bg2}}>
    <AppHeader title="상품관리" dot={true}/>
    <BoatSelector selectedBoatId={selectedBoatId} onSelect={onSelectBoat}/>

    {/* 탭 */}
    <div style={{display:"flex",background:C.white,borderBottom:`1px solid ${C.line}`,padding:"0 16px",gap:0}}>
      {[["daily","일자별상품"],["master","출조종류 관리"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"13px 0",border:"none",background:"transparent",fontWeight:tab===k?700:500,fontSize:14,color:tab===k?C.blue:C.desc,cursor:"pointer",borderBottom:tab===k?`2.5px solid ${C.blue}`:"2.5px solid transparent",letterSpacing:"-0.3px",marginBottom:-1}}>{l}</button>
      ))}
    </div>

    {/* 탭별 콘텐츠 */}
    {tab==="daily"&&<DailyProductTab
      dailyProducts={dailyProducts} setDailyProducts={setDailyProducts}
      masterProducts={masterProducts} addManualRsv={addManualRsv} allRsvs={allRsvs}
    />}

    {tab==="master"&&<div style={{padding:"14px 16px"}}>
      {/* 마스터상품 안내 */}
      <div style={{background:"#EBF0FF",borderRadius:10,padding:"11px 14px",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:12,color:C.blue,marginBottom:3,letterSpacing:"-0.3px"}}>출조종류 관리란?</div>
        <div style={{fontSize:12,color:"#3366CC",lineHeight:1.6,letterSpacing:"-0.2px"}}>출조상품의 종류·운영기간·요금을 등록합니다.<br/>등록한 종류 기준으로 날짜별 출조가 자동 생성됩니다.</div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <button onClick={()=>setModal({type:"addMaster"})} style={{padding:"9px 18px",border:"none",borderRadius:9,background:C.blue,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer",letterSpacing:"-0.3px"}}>+ 출조종류 등록</button>
      </div>
      {masterProducts.length===0&&<div style={{padding:"40px 0",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:10}}>📋</div>
        <div style={{fontWeight:700,fontSize:14,color:C.desc}}>등록된 출조종류가 없습니다</div>
      </div>}
      {masterProducts.map(m=>(
        <MasterProductCard key={m.id} master={m}
          dailyCount={dailyProducts.filter(d=>d.masterProductId===m.id).length}
          onEdit={m=>setModal({type:"editMaster",master:m})}
          onDelete={handleDeleteMaster}
        />
      ))}
    </div>}

/* ─── BULK EDIT ─────────────── */
function BulkEditScreen({onBack,products,setProducts}){
  const [days,setDays]=useState([]);
  const [selProds,setSelProds]=useState([]);
  const [dropOpen,setDropOpen]=useState(false);
  const [newStatus,setNewStatus]=useState("");
  const [newCap,setNewCap]=useState("");
  const [toast,setToast]=useState("");
  const dArr=["일","월","화","수","목","금","토"];
  const toggleDay=d=>{if(d==="전체")setDays(days.length===7?[]:dArr);else setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);};
  const toggleProd=n=>setSelProds(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  const pNames=[...new Set(products.map(p=>p.name))];
  const apply=()=>{
    if(!newStatus&&!newCap){return;}
    setProducts(prev=>prev.map(p=>{
      if(selProds.length>0&&!selProds.includes(p.name))return p;
      const dow=DAY_KO[new Date(p.date).getDay()];
      if(days.length>0&&!days.includes(dow))return p;
      return{...p,...(newStatus?{status:newStatus}:{}),...(newCap?{capacity:Math.max(p.sold,parseInt(newCap))}:{})};
    }));
    setToast("일괄 수정 완료");
    setTimeout(onBack,1600);
  };
  const labelStyle={fontWeight:700,fontSize:14,marginBottom:10,letterSpacing:"-0.5px",color:C.black,paddingBottom:8,borderBottom:`1.5px solid ${C.line}`};

    <AppHeader title="상품 일괄수정" onBack={onBack}/>
    <div style={{padding:16}}>
      <div style={{background:"#FFF8E0",borderRadius:10,border:`1px solid #FFE580`,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#8A6400",lineHeight:1.6,letterSpacing:"-0.2px"}}>
        ⚠ 아래 조건에 해당하는 상품이 모두 수정됩니다.<br/>날짜·요일·상품명 미선택 시 전체 상품에 적용됩니다.
      </div>

      <div style={{marginBottom:20}}>
        <div style={labelStyle}>📅 날짜 범위</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {["시작일","종료일"].map((pl,i)=><input key={i} defaultValue={i===0?"2026.02.01":"2026.02.28"} style={{flex:1,border:`1.5px solid ${C.line2}`,borderRadius:8,padding:"10px 12px",fontSize:13,background:C.white,letterSpacing:"-0.2px"}}/>)}
        </div>
        <div style={{fontSize:11,color:C.desc,marginBottom:8,letterSpacing:"-0.2px"}}>요일 선택 (미선택 시 전체)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {["전체",...dArr].map(d=>{const a=d==="전체"?days.length===7:days.includes(d);return <button key={d} onClick={()=>toggleDay(d)} style={{padding:"9px 0",border:`1.5px solid`,borderColor:a?C.blue:C.line,borderRadius:8,background:a?C.blueBg:C.white,color:a?C.blue:C.desc,fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:"-0.3px"}}>{d}</button>;})}
        </div>
      </div>

      <div style={{marginBottom:20}}>
        <div style={labelStyle}>🛍 상품 선택</div>
        <div style={{position:"relative"}}>
          <button onClick={()=>setDropOpen(!dropOpen)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",border:`1.5px solid ${C.line2}`,borderRadius:8,padding:"11px 14px",background:C.white,fontSize:13,color:selProds.length>0?C.black:C.dimmed,cursor:"pointer",letterSpacing:"-0.2px"}}>
            <span>{selProds.length>0?`${selProds.length}개 선택됨`:"전체 상품"}</span>
            <span style={{color:C.dimmed,fontSize:12}}>{dropOpen?"▲":"▼"}</span>
          </button>
          {dropOpen&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.white,border:`1px solid ${C.line}`,borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,.1)",zIndex:50,maxHeight:180,overflowY:"auto",marginTop:4}}>
            {pNames.map(name=><button key={name} onClick={()=>toggleProd(name)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"12px 14px",border:"none",background:C.white,borderBottom:`1px solid ${C.line}`,fontSize:13,color:C.black,cursor:"pointer",letterSpacing:"-0.2px"}}>
              <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid`,borderColor:selProds.includes(name)?C.blue:C.line2,background:selProds.includes(name)?C.blue:C.white,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.white,fontWeight:700}}>{selProds.includes(name)?"✓":""}</div>
              <span>{name}</span>
            </button>)}
          </div>}
        </div>
      </div>

      <div style={{marginBottom:24}}>

              {[["selling","판매중",C.blue],["stop","판매중지",C.desc],["마감","즉시마감",C.red]].map(([v,l,c])=><button key={v} onClick={()=>setNewStatus(s=>s===v?"":v)} style={{padding:"10px",border:`1.5px solid`,borderColor:newStatus===v?c:C.line,borderRadius:8,background:newStatus===v?c:C.white,color:newStatus===v?C.white:C.desc,fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:"-0.2px"}}>{l}</button>)}

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
              {[5,8,10,11,15,20].map(n=><button key={n} onClick={()=>setNewCap(String(n))} style={{padding:"7px",border:`1.5px solid`,borderColor:newCap===String(n)?C.blue:C.line,borderRadius:7,background:newCap===String(n)?C.blueBg:C.white,color:newCap===String(n)?C.blue:C.desc,fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:"-0.2px"}}>{n}</button>)}
            </div>
          </div>
        </div>

      <div style={{marginBottom:20}}><div style={labelStyle}>조황 내용</div><textarea placeholder="조황 내용을 자유롭게 입력해 주세요." rows={4} style={{...inputStyle,resize:"none",fontFamily:"inherit"}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,paddingBottom:32}}>
        <Btn label="취소" onClick={onClose} variant="line"/>
        <Btn label="조황등록" onClick={register} variant="primary"/>
      </div>
    </div>
    {toast&&<Toast msg={toast} onDone={()=>setToast("")}/>}
  </div>;
}

/* ═══ NOTICE ═══ */
function NoticeScreen({selectedBoatId,onSelectBoat}){
  const [notices,setNotices]=useState([]);
  const [adding,setAdding]=useState(false);
  const [title,setTitle]=useState("");const [body,setBody]=useState("");
  const [toast,setToast]=useState("");
  const add=()=>{if(!title.trim())return;setNotices(p=>[{id:Date.now(),title,body,date:"2026.02.28",views:0},...p]);setTitle("");setBody("");setAdding(false);setToast("공지가 등록됐습니다");};
  const inputStyle={width:"100%",border:`1.5px solid ${C.line2}`,borderRadius:8,padding:"10px 12px",fontSize:14,background:C.white,letterSpacing:"-0.2px"};
  return <div style={{flex:1,overflowY:"auto",paddingBottom:130,background:C.bg2}}>
    <AppHeader title="공지관리"/>
    <BoatSelector selectedBoatId={selectedBoatId} onSelect={onSelectBoat}/>
    <div style={{padding:"0 16px"}}>
      {notices.length===0&&<div style={{padding:"70px 0",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:12}}>📢</div>
        <div style={{fontWeight:700,fontSize:16,color:C.desc,letterSpacing:"-0.5px"}}>등록된 공지가 없습니다</div>
        <div style={{fontSize:13,color:C.dimmed,marginTop:4,letterSpacing:"-0.2px"}}>공지를 등록해 탑승객에게 알려보세요.</div>
      </div>}
      {notices.map((n)=><div key={n.id} style={{background:C.white,borderRadius:12,border:`1px solid ${C.line}`,marginBottom:10,overflow:"hidden"}}>
        <div style={{padding:"13px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
            <div style={{fontWeight:700,fontSize:14,flex:1,marginRight:8,letterSpacing:"-0.5px"}}>{n.title}</div>
            <span style={{fontSize:11,color:C.dimmed,flexShrink:0,letterSpacing:"-0.2px"}}>조회 {n.views}</span>
          </div>
          <div style={{fontSize:11,color:C.dimmed,marginBottom:8,letterSpacing:"-0.2px"}}>{n.date}</div>
          {n.body&&<div style={{fontSize:13,color:C.desc,lineHeight:1.6,marginBottom:10,letterSpacing:"-0.2px"}}>{n.body}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <button style={{padding:"8px",border:`1px solid ${C.line}`,borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",color:C.black,background:C.bg1,letterSpacing:"-0.2px"}}>수정</button>
            <button onClick={()=>setNotices(p=>p.filter(x=>x.id!==n.id))} style={{padding:"8px",border:`1px solid #FFD0D0`,borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",color:C.red,background:"#FFF5F5",letterSpacing:"-0.2px"}}>삭제</button>
          </div>
        </div>
      </div>)}
    </div>
    {adding&&<BottomSheet title="공지 등록" onClose={()=>setAdding(false)}>
      <div style={{padding:"16px 20px 32px"}}>
        <div style={{marginBottom:12}}><div style={{fontSize:12,color:C.desc,fontWeight:600,marginBottom:5,letterSpacing:"-0.2px"}}>제목 <span style={{color:C.red}}>*</span></div><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="공지 제목을 입력해 주세요." style={inputStyle}/></div>
        <div style={{marginBottom:20}}><div style={{fontSize:12,color:C.desc,fontWeight:600,marginBottom:5,letterSpacing:"-0.2px"}}>내용</div><textarea value={body} onChange={e=>setBody(e.target.value)} rows={4} placeholder="공지 내용을 입력해 주세요." style={{...inputStyle,resize:"none",fontFamily:"inherit"}}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Btn label="취소" onClick={()=>setAdding(false)} variant="line"/>
          <Btn label="등록" onClick={add} variant="primary"/>
        </div>
      </div>
    </BottomSheet>}
    <div style={{position:"fixed",bottom:72,left:"50%",transform:"translateX(-50%)",width:390,padding:"0 16px",boxSizing:"border-box"}}>
      <button onClick={()=>setAdding(true)} style={{width:"100%",padding:"14px",background:C.blue,color:C.white,border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:"-0.3px"}}>공지 등록하기 +</button>
    </div>
    {toast&&<Toast msg={toast} onDone={()=>setToast("")}/>}
  </div>;
}

/* ═══ APP ROOT ═══ */
/* ═══ FEEDBACK PANEL ═══ */
const SCREEN_LABELS={home:"홈",settlement:"정산",settlementDetail:"정산 상세",reservation:"예약관리",product:"상품관리",fishing:"출조보고",notice:"공지사항"};
const SCREEN_KEYS=["home","reservation","product","settlement","fishing","notice","settlementDetail"];

function FeedbackPanel({screen}){
  const [open,setOpen]=useState(true); // 기본 펼침
  const [comments,setComments]=useState({});     // {screenKey:[{id,author,text,ts,editing}]}
  const [draft,setDraft]=useState({author:"",text:""});
  const [editDraft,setEditDraft]=useState({});   // {id:{author,text}}
  const textRef=useRef(null);

  const screenComments=comments[screen]||[];
  const count=Object.values(comments).reduce((s,arr)=>s+(arr||[]).length,0);

  const addComment=()=>{
    if(!draft.text.trim())return;
    const name=draft.author.trim()||"익명";
    const ts=new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).replace(/\. /g,".").replace(",","");
    const newC={id:Date.now(),author:name,text:draft.text.trim(),ts,editing:false};
    setComments(c=>({...c,[screen]:[newC,...(c[screen]||[])]}));
    setDraft(d=>({...d,text:""}));
    if(textRef.current)textRef.current.focus();
  };
  const deleteComment=(id)=>{
    setComments(c=>({...c,[screen]:(c[screen]||[]).filter(x=>x.id!==id)}));
  };
  const startEdit=(c)=>{
    setEditDraft(d=>({...d,[c.id]:{author:c.author,text:c.text}}));
    setComments(cs=>({...cs,[screen]:(cs[screen]||[]).map(x=>x.id===c.id?{...x,editing:true}:x)}));
  };
  const saveEdit=(id)=>{
    const d=editDraft[id];
    if(!d||!d.text.trim())return;
    setComments(cs=>({...cs,[screen]:(cs[screen]||[]).map(x=>x.id===id?{...x,author:d.author||"익명",text:d.text.trim(),editing:false,edited:true}:x)}));
  };
  const cancelEdit=(id)=>{
    setComments(cs=>({...cs,[screen]:(cs[screen]||[]).map(x=>x.id===id?{...x,editing:false}:x)}));
  };

  const panelBg="#F8F9FF";
  const border="#E4E8FF";
  const accent="#0041FF";
  const tagColors=["#EBF0FF","#E8FFF3","#FFF8E0","#FFE8E8","#F5E8FF","#E8F8FF","#F0FFE8"];
  const tagTextColors=[accent,"#00875A","#996600","#CC0000","#6600CC","#0077CC","#2D8000"];

  return <div style={{display:"flex",flexDirection:"column",width:open?340:48,transition:"width .25s cubic-bezier(.16,1,.3,1)",flexShrink:0,position:"sticky",top:0,height:"100vh",alignSelf:"flex-start"}}>
    {/* 토글 탭 */}
    <button onClick={()=>setOpen(o=>!o)} title={open?"의견 패널 닫기":"의견 패널 열기"}
      style={{position:"absolute",left:-1,top:20,width:24,height:56,background:accent,border:"none",borderRadius:"8px 0 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,zIndex:10,boxShadow:"-2px 0 8px rgba(0,65,255,.15)"}}>
      <div style={{width:2,height:12,background:"rgba(255,255,255,.9)",borderRadius:1,transform:open?"rotate(30deg)":"rotate(-30deg)",transformOrigin:"center",transition:"transform .2s"}}/>
      <div style={{width:2,height:12,background:"rgba(255,255,255,.9)",borderRadius:1,transform:open?"rotate(-30deg)":"rotate(30deg)",transformOrigin:"center",transition:"transform .2s"}}/>
      {!open&&count>0&&<div style={{position:"absolute",top:-6,right:-4,background:"#FF3B3B",borderRadius:10,minWidth:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff",padding:"0 3px"}}>{count}</div>}
    </button>

    {open&&<div style={{flex:1,display:"flex",flexDirection:"column",background:panelBg,borderLeft:`1.5px solid ${border}`,height:"100vh",overflowY:"hidden"}}>
      {/* 헤더 */}
      <div style={{padding:"16px 16px 12px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:24,height:24,background:accent,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <span style={{fontWeight:700,fontSize:13,letterSpacing:"-0.3px",color:"#1a1a2e"}}>프로토타입 의견</span>
            {count>0&&<span style={{background:accent,color:"#fff",fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 7px"}}>{count}</span>}
          </div>
        </div>
        {/* 화면 탭 */}
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {SCREEN_KEYS.map((k,i)=>{
            const cnt=(comments[k]||[]).length;
            const active=screen===k;
            return <div key={k} style={{padding:"4px 9px",borderRadius:20,fontSize:11,fontWeight:active?700:500,letterSpacing:"-0.2px",background:active?accent:cnt>0?"#EBF0FF":"#EDEDF0",color:active?"#fff":cnt>0?accent:"#888",cursor:"default",display:"flex",alignItems:"center",gap:3}}>
              {SCREEN_LABELS[k]}
              {cnt>0&&<span style={{fontSize:10,fontWeight:700,color:active?"rgba(255,255,255,.85)":accent}}>{cnt}</span>}
            </div>;
          })}
        </div>
      </div>

      {/* 현재 화면 레이블 */}
      <div style={{padding:"10px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:3,height:14,background:accent,borderRadius:2}}/>
          <span style={{fontWeight:700,fontSize:13,color:accent,letterSpacing:"-0.3px"}}>{SCREEN_LABELS[screen]||screen} 화면</span>
          {screenComments.length>0&&<span style={{fontSize:11,color:"#888"}}>{screenComments.length}개</span>}
        </div>
      </div>

      {/* 댓글 목록 */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
        {screenComments.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"#aaa"}}>
          <div style={{fontSize:28,marginBottom:8}}>💬</div>
          <div style={{fontSize:12,letterSpacing:"-0.2px",lineHeight:1.6}}>이 화면에 대한 의견을 남겨보세요</div>
        </div>}
        {screenComments.map((c,i)=>{
          const ci=i%tagColors.length;
          return <div key={c.id} style={{background:"#fff",borderRadius:10,padding:"11px 12px",border:`1px solid ${border}`,boxShadow:"0 1px 4px rgba(0,65,255,.05)"}}>
            {c.editing?<div>
              <input value={editDraft[c.id]?.author||""} onChange={e=>setEditDraft(d=>({...d,[c.id]:{...d[c.id],author:e.target.value}}))}
                placeholder="이름" style={{width:"100%",border:`1.5px solid ${accent}`,borderRadius:6,padding:"5px 8px",fontSize:12,marginBottom:6,background:"#fff"}}/>
              <textarea value={editDraft[c.id]?.text||""} onChange={e=>setEditDraft(d=>({...d,[c.id]:{...d[c.id],text:e.target.value}}))}
                style={{width:"100%",border:`1.5px solid ${accent}`,borderRadius:6,padding:"6px 8px",fontSize:12,resize:"none",lineHeight:1.5,minHeight:60,background:"#fff"}}/>
              <div style={{display:"flex",gap:6,marginTop:6}}>
                <button onClick={()=>saveEdit(c.id)} style={{flex:1,padding:"5px",border:"none",borderRadius:6,background:accent,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>저장</button>
                <button onClick={()=>cancelEdit(c.id)} style={{flex:1,padding:"5px",border:`1px solid ${border}`,borderRadius:6,background:"#fff",color:"#888",fontSize:11,cursor:"pointer"}}>취소</button>
              </div>
            </div>:<div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:22,height:22,borderRadius:11,background:tagColors[ci],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:tagTextColors[ci],flexShrink:0}}>
                    {c.author.charAt(0)}
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:"#333",letterSpacing:"-0.2px"}}>{c.author}</span>
                  {c.edited&&<span style={{fontSize:9,color:"#aaa"}}>(수정됨)</span>}
                </div>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  <span style={{fontSize:9,color:"#bbb"}}>{c.ts}</span>
                  <button onClick={()=>startEdit(c)} style={{border:"none",background:"none",cursor:"pointer",padding:"2px",color:"#aaa",fontSize:11,lineHeight:1}}>✏</button>
                  <button onClick={()=>deleteComment(c.id)} style={{border:"none",background:"none",cursor:"pointer",padding:"2px",color:"#ccc",fontSize:11,lineHeight:1}}>✕</button>
                </div>
              </div>
              <div style={{fontSize:12,color:"#444",lineHeight:1.6,letterSpacing:"-0.2px",wordBreak:"break-all"}}>{c.text}</div>
            </div>}
          </div>;
        })}
      </div>

      {/* 입력창 */}
      <div style={{borderTop:`1px solid ${border}`,padding:"10px 12px 12px",flexShrink:0,background:panelBg}}>
        <input value={draft.author} onChange={e=>setDraft(d=>({...d,author:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&textRef.current&&textRef.current.focus()}
          placeholder="이름 (선택)" style={{width:"100%",border:`1.5px solid ${border}`,borderRadius:7,padding:"6px 10px",fontSize:12,marginBottom:6,background:"#fff",letterSpacing:"-0.2px"}}/>
        <textarea ref={textRef} value={draft.text} onChange={e=>setDraft(d=>({...d,text:e.target.value}))}
          onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))addComment();}}
          placeholder={`${SCREEN_LABELS[screen]||screen} 화면 의견 입력…\n(Ctrl+Enter로 등록)`}
          style={{width:"100%",border:`1.5px solid ${border}`,borderRadius:7,padding:"8px 10px",fontSize:12,resize:"none",lineHeight:1.5,minHeight:68,background:"#fff",marginBottom:6,letterSpacing:"-0.2px"}}/>
        <button onClick={addComment} disabled={!draft.text.trim()}
          style={{width:"100%",padding:"8px",border:"none",borderRadius:7,background:draft.text.trim()?accent:"#C5CCEE",color:"#fff",fontWeight:700,fontSize:12,cursor:draft.text.trim()?"pointer":"default",letterSpacing:"-0.3px",transition:"background .15s"}}>
          의견 등록
        </button>
      </div>
    </div>}
  </div>;
}

/* ═══ APP ROOT ═══ */
function App(){
  const [nav,setNav]=useState("home");
  const [screen,setScreen]=useState("home");
  const [showSchedule,setShowSchedule]=useState(false);
  const [showFishing,setShowFishing]=useState(false);

  // 마스터상품 상태
  const [masterProducts,setMasterProducts]=useState(initMasterProducts);
  // 일자별상품 상태
  const [dailyProducts,setDailyProducts]=useState(initDailyProducts);
  // 홈/예약 화면 호환용 products (일자별상품 → legacy 형태 변환)
  const products=dailyProducts.map(d=>({
    id:d.id,name:d.bpiName,price:d.bpiAdultRate,
    capacity:d.bpiQty,sold:d.sold,
    status:d.bpiIsDisplay?"selling":"stop",
    date:d.date,depart:d.bpiSReleaseTime,arrive:d.bpiEReleaseTime,
    type:d.bpiReleaseDay==="T"?"당일":"야간",
    fish:d.fishSpecies,minBuy:1,memo:"",
  }));
  const setProducts=()=>{}; // no-op (legacy compat)

  const [manualRsvs,setManualRsvs]=useState([]);
  const [toast,setToast]=useState("");
  const [selectedBoatId,setSelectedBoatId]=useState(1);
  const onSelectBoat=id=>{setSelectedBoatId(id);};

  const goNav=k=>{setNav(k);setScreen(k);};
  const goBack=()=>setScreen(nav);
  const addManualRsv=rsv=>{
    setManualRsvs(p=>[rsv,...p]);
    setDailyProducts(ps=>ps.map(p=>p.id===rsv.prodId?{...p,sold:p.sold+rsv.adults+(rsv.kids||0)}:p));
  };
  const handleEmergencyCancel=()=>{
    setToast("출항 취소 처리 완료 · 예약 고객 6명에게 알림 발송");
  };
  const allRsvs=[...manualRsvs,...RESERVATIONS];
  const bp={selectedBoatId,onSelectBoat}; // boat props shorthand

  const renderScreen=()=>{
    switch(screen){
      case"home":return <HomeScreen onScheduleModal={()=>setShowSchedule(true)} onGoReservation={()=>setScreen("reservation")} products={products} onEmergencyCancel={handleEmergencyCancel} allRsvs={allRsvs} {...bp}/>;
      case"settlement":return <SettlementScreen onDetail={()=>setScreen("settlementDetail")} {...bp}/>;
      case"settlementDetail":return <SettlementDetailScreen onBack={goBack}/>;
      case"reservation":return <ReservationScreen onBack={goBack} allRsvs={allRsvs} addManualRsv={addManualRsv} products={products} {...bp}/>;
      case"product":return <ProductListScreen
        products={products} setProducts={setProducts}
        masterProducts={masterProducts} setMasterProducts={setMasterProducts}
        dailyProducts={dailyProducts} setDailyProducts={setDailyProducts}
        addManualRsv={addManualRsv} allRsvs={allRsvs} {...bp}
      />;
      case"fishing":return <FishingReportScreen onAdd={()=>setShowFishing(true)} {...bp}/>;
      case"notice":return <NoticeScreen {...bp}/>;
      default:return <HomeScreen onScheduleModal={()=>setShowSchedule(true)} onGoReservation={()=>setScreen("reservation")} products={products} {...bp}/>;
    }
  };
  const hideNav=["reservation","settlementDetail"].includes(screen);

  return <div style={{display:"flex",justifyContent:"center",minHeight:"100vh",background:"#d6d6d6",alignItems:"flex-start"}}>
    {/* 앱 프레임 — willChange:transform으로 position:fixed 자식들을 이 컨테이너 기준으로 고정 */}
    <div style={{width:390,minHeight:"100vh",background:C.bg2,display:"flex",flexDirection:"column",position:"relative",overflowX:"hidden",willChange:"transform",flexShrink:0}}>
      {renderScreen()}
      {!hideNav&&<BottomNav active={nav} onNav={goNav}/>}
      {showSchedule&&<ScheduleModal onClose={()=>setShowSchedule(false)}/>}
      {showFishing&&<FishingModal onClose={()=>setShowFishing(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast("")}/>}
    </div>
    {/* 의견 패널 */}
    <FeedbackPanel screen={screen}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
